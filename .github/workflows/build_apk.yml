name: Build Android APK & Deploy HF
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Penting supaya git push ke HF lancar

      # --- BAGIAN HUGGING FACE (Server/API Update) ---
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Ganti 'Username/Repo' sesuai punya lo
          git remote add hf https://x-access-token:$HF_TOKEN@huggingface.co/spaces/husnulirdoq/wellbeing-flet-api
          git push --force hf main

      # --- BAGIAN ANDROID (Build APK) ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet & Dependencies
        run: |
          pip install flet requests
          if [ -f frontend/requirements.txt ]; then pip install -r frontend/requirements.txt; fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          flet build apk frontend

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Wellbeing-App-Release
          path: frontend/build/apk/*.apk
          if-no-files-found: error